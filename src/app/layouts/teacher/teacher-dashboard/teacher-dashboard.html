<div class="teacher-dashboard">
  <h2 class="page-title">Teacher dashboard</h2>

  <section class="stats-grid">
    <article class="stat-card primary">
      <h3>Students</h3>
      <p class="stat-number">{{ totalStudents }}</p>
      <p class="stat-caption">In the system</p>
    </article>

    <article class="stat-card">
      <h3>My activities</h3>
      <p class="stat-number">{{ totalActivities }}</p>
      <p class="stat-caption">Created by you</p>
    </article>

    <article class="stat-card">
      <h3>Upcoming activities</h3>
      <p class="stat-number">{{ upcomingActivities }}</p>
      <p class="stat-caption">Deadline not yet passed</p>
    </article>

    <article class="stat-card">
      <h3>My announcements</h3>
      <p class="stat-number">{{ totalAnnouncements }}</p>
      <p class="stat-caption">Posted to students</p>
    </article>
  </section>
</div>
