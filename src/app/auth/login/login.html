<div class="login-page">
  <div class="login-card">

    <!-- Left green panel -->
    <div class="login-left">
      <div class="brand">
        <img src="/stacklogo.png" alt="StudyStack Logo" />
        <span class="brand-name">
          <span class="Study">Study</span><span class="Stack">Stack</span>
        </span>
      </div>

      <div class="tagline">
        <h1>"Manage. Learn. Stay connected."</h1>
        <p>
          An online classroom management system that keeps records,
          activities, attendance, and announcements in one place.
        </p>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="login-right">
      <h2>Welcome Back to StudyStack!</h2>
      <p class="subtitle">Track your class records with StudyStack</p>

      <form (ngSubmit)="login()">
        <input
          id="UID"
          name="UID"
          class="form-control"
          [(ngModel)]="UID"
          required
          placeholder="UID"
        />

        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          [(ngModel)]="password"
          required
          placeholder="Password"
        />

        <button type="submit" class="login-button">Login</button>

        <div class="form-footer">
          <a class="forgot">Forgot Password?</a>
          <label class="remember">
            <input type="checkbox" /> Remember sign in details
          </label>
        </div>
      </form>
    </div>

  </div>
</div>
