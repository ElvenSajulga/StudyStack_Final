<div class="login-page">
  <div class="login-card">

    <!-- Left green panel -->
    <div class="login-left">
      <div class="brand">
        <img src="/stacklogo.png" alt="StudyStack Logo" />
        <span class="brand-name">
          <span class="Study">Study</span><span class="Stack">Stack</span>
        </span>
      </div>

      <div class="tagline">
        <h1>"Manage. Learn. Stay connected."</h1>
        <p>
          An online classroom management system that keeps records,
          activities, attendance, and announcements in one place.
        </p>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="login-right">
      <h2>Welcome Back to StudyStack!</h2>
      <p class="subtitle">Track your class records with StudyStack</p>

      <form (ngSubmit)="login()" [class.shake]="shake" novalidate>
        <input
          id="UID"
          name="UID"
          class="form-control"
          [(ngModel)]="UID"
          [disabled]="loading"
          required
          placeholder="UID"
          autocomplete="username"
        />

        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            class="form-control"
            [(ngModel)]="password"
            [disabled]="loading"
            required
            placeholder="Password"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [disabled]="loading"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <i class="ti" [class.ti-eye]="showPassword" [class.ti-eye-off]="!showPassword"></i>
          </button>
        </div>

        <button
          type="submit"
          class="login-button"
          [class.is-loading]="loading"
          [disabled]="loading"
          [attr.aria-busy]="loading ? 'true' : 'false'"
        >
          <span class="btn-label" aria-hidden="true">{{ loading ? 'Signing in' : 'Login' }}</span>
          @if (loading) {
            <span class="btn-spinner" aria-hidden="true"></span>
            <span class="visually-hidden">Signing in, please wait</span>
          }
        </button>

        <div class="form-footer">
          <a class="forgot">Forgot Password?</a>
          <label class="remember">
            <input type="checkbox" [disabled]="loading" /> Remember sign in details
          </label>
        </div>
      </form>
    </div>

  </div>
</div>
