<div class="app-shell">
  <!-- When logged in, show topbar + sidebar layout -->
  <ng-container *ngIf="auth.isLoggedIn(); else authRoutes">
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">
          <img src="/stacklogo.png" alt="StudyStack logo" />
          <span class="brand-name">StudyStack</span>
        </div>
        <span class="topbar-role" *ngIf="auth.getCurrentUser()?.role as role">
          {{ role | uppercase }} PORTAL
        </span>
      </div>

      <div class="topbar-right">
        <span class="user-name" *ngIf="auth.getCurrentUser() as user">
          {{ user.name || 'User' }}
        </span>
        <button type="button" class="logout-btn" (click)="logout()">
          Logout
        </button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar">
        <!-- Admin links -->
        <ng-container *ngIf="auth.isAdmin()">
          <h3 class="sidebar-title">Admin</h3>
          <a routerLink="/admin-dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/admin-students" routerLinkActive="active">Students</a>
          <a routerLink="/admin-teachers" routerLinkActive="active">Teachers</a>
          <a routerLink="/admin-profile" routerLinkActive="active">Profile</a>
          <a routerLink="/admin-settings" routerLinkActive="active">Settings</a>
        </ng-container>

        <!-- Teacher links -->
        <ng-container *ngIf="auth.isTeacher()">
          <h3 class="sidebar-title">Teacher</h3>
          <a routerLink="/teacher-dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/teacher-activity" routerLinkActive="active">Activities</a>
          <a routerLink="/teacher-attendance" routerLinkActive="active">Attendance</a>
          <a routerLink="/teacher-class-record" routerLinkActive="active">Class record</a>
          <a routerLink="/teacher-announcement" routerLinkActive="active">Announcements</a>
          <a routerLink="/teacher-profile" routerLinkActive="active">Profile</a>
          <a routerLink="/teacher-settings" routerLinkActive="active">Settings</a>
        </ng-container>

        <!-- Student links -->
        <ng-container *ngIf="auth.isStudent()">
          <h3 class="sidebar-title">Student</h3>
          <a routerLink="/student-dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/student-activity" routerLinkActive="active">Activities</a>
          <a routerLink="/student-attendance" routerLinkActive="active">Attendance</a>
          <a routerLink="/student-grade" routerLinkActive="active">Grades</a>
          <a routerLink="/student-announcement" routerLinkActive="active">Announcements</a>
          <a routerLink="/student-profile" routerLinkActive="active">Profile</a>
          <a routerLink="/student-settings" routerLinkActive="active">Settings</a>
        </ng-container>
      </nav>

      <main class="content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </ng-container>

  <!-- For login and other public routes -->
  <ng-template #authRoutes>
    <router-outlet></router-outlet>
  </ng-template>
</div>
